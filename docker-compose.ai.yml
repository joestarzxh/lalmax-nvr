# Docker Compose for lalmax-nvr with AI Services
#
# Usage:
#   docker compose -f docker-compose.ai.yml up -d
#
# This will start:
#   1. lalmax-nvr (the NVR)
#   2. yolo-service (YOLO object detection - optional)
#
# For multimodal analysis (DeepSeek/OpenAI), configure in the NVR web UI:
#   - Go to Settings -> AI Detection
#   - Select "大模型分析" as backend
#   - Configure your API key and provider settings

services:
  lalmax-nvr:
    image: ghcr.io/lalmax-pro/lalmax-nvr:latest
    container_name: lalmax-nvr
    restart: unless-stopped
    ports:
      - "9090:9090"
      - "5060:5060/tcp"
      - "5060:5060/udp"
    volumes:
      - ./data:/data
    environment:
      - NVR_DATA_DIR=/data
      - YOLO_SERVICE_URL=http://yolo-service:18888

  yolo-service:
    build:
      context: ./docker/yolo-service
      dockerfile: Dockerfile
    environment:
      - PORT=18888
      - MODEL=yolov8n.pt
      - CONFIDENCE=0.5
      - DEVICE=cpu
    ports:
      - "18888:18888"
    restart: unless-stopped
    # Uncomment for GPU support (requires nvidia-docker):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
