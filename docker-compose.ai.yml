# Docker Compose for lalmax-nvr with AI Detection (Webhook Mode)
#
# Architecture:
#   ai-detector subscribes to NVR's RTSP streams → runs YOLO detection
#   → pushes results via webhook to NVR → triggers multimodal LLM analysis
#
# Usage:
#   docker compose -f docker-compose.ai.yml up -d
#
# This will start:
#   1. lalmax-nvr (the NVR)
#   2. ai-detector (YOLO + ByteTrack object detection, pushes via webhook)
#
# For multimodal analysis (DeepSeek/OpenAI), configure in lalmax-nvr.yaml:
#   ai:
#     enabled: true
#     backend: webhook
#     multimodal:
#       enabled: true
#       provider: deepseek
#       providers:
#         deepseek:
#           api_key: your-api-key
#           model: deepseek-chat
#           vision_model: deepseek-vision

services:
  lalmax-nvr:
    image: lalmax-nvr:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lalmax-nvr
    restart: unless-stopped
    ports:
      - "9090:9090"
      - "15544:15544"  # RTSP server (for ai-detector to subscribe)
      - "5060:5060/tcp"
      - "5060:5060/udp"
    volumes:
      - ./data:/data
    environment:
      - NVR_DATA_DIR=/data

  ai-detector:
    build:
      context: ./docker/ai-detector
      dockerfile: Dockerfile
    container_name: ai-detector
    depends_on:
      - lalmax-nvr
    environment:
      - NVR_URL=http://lalmax-nvr:9090
      - NVR_AUTH=  # Base64 encoded auth if needed
      - YOLO_MODEL=yolov8n.pt
      - CONFIDENCE=0.5
      - FRAME_SKIP=5
      - SYNC_INTERVAL=30
      - RTSP_PORT=15544
      - ENABLE_TRACKING=true
      - PORT=8080
    ports:
      - "8080:8080"  # Health check endpoint
    restart: unless-stopped
    # Uncomment for GPU support (requires nvidia-docker):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
